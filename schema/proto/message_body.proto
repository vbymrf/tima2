syntax = "proto3";

// Открытый текст сообщения ДО сжатия и шифрования:
//   MessageBody --serialize--> protobuf --zstd--> Kodium.encryptSymmetric(message_key) = Envelope.encrypted_payload
// Формат текста — plain text + entities (module-boundaries.md §5). Тот же словарь
// EntityType используют посты (publications) — единый рендер.
package tima.crypto.v1;

option java_package = "io.tima.crypto.proto";
option java_multiple_files = true;

message MessageBody {
  string text = 1;                   // UTF-8
  repeated Entity entities = 2;      // offset/length — в UTF-16 code units (см. README: фикс interop)
  repeated MediaRef media = 3;       // вложения (media_key внутри — под шифрованием body)
}

message Entity {
  EntityType type = 1;
  uint32 offset = 2;                 // начало в UTF-16 code units
  uint32 length = 3;                 // длина в UTF-16 code units
  string url = 4;                    // ET_LINK
  string user_id = 5;                // ET_MENTION
  string attribute = 6;              // ET_HASHTAG — нормализованное имя атрибута (feed-ranking §3)
  string media_id = 7;               // ET_MEDIA (inline в статьях)
}

enum EntityType {
  ET_UNSPECIFIED = 0;
  ET_BOLD = 1;
  ET_ITALIC = 2;
  ET_UNDERLINE = 3;
  ET_STRIKETHROUGH = 4;
  ET_CODE = 5;
  ET_QUOTE = 6;
  ET_HEADING = 7;
  ET_LIST_ITEM = 8;
  ET_LINK = 9;
  ET_MENTION = 10;
  ET_HASHTAG = 11;
  ET_MEDIA = 12;
}

message MediaRef {
  string media_id = 1;
  bytes media_key = 2;               // 32 B — ключ шифрования медиа-объекта (media-storage.md §5)
  string mime = 3;
  uint64 size_bytes = 4;
  uint32 width = 5;
  uint32 height = 6;
  uint32 duration_ms = 7;
  string blurhash = 8;               // плейсхолдер до загрузки
  uint32 chunk_count = 9;            // >1 → chunked (§10.3)
}
